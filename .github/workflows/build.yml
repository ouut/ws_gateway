name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.2)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: true
        type: boolean

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Linux: x86_64 + aarch64 (cross-compile)
  # ═══════════════════════════════════════════════════════════════════════
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { triple: x86_64-unknown-linux-gnu,   name: linux-x86_64 }
          - { triple: aarch64-unknown-linux-gnu,  name: linux-aarch64 }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}

      - name: Install cross-compiler (ARM64)
        if: matrix.target.triple == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          mkdir -p .cargo
          # Overwrite (not append) to avoid duplicate TOML sections
          cat > .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Test (native only)
        if: matrix.target.triple == 'x86_64-unknown-linux-gnu'
        run: |
          cargo test --manifest-path doc/gateway-protocol/Cargo.toml
          cargo test

      - name: Build
        run: cargo build --release --target ${{ matrix.target.triple }}

      - name: Rename binary
        run: cp target/${{ matrix.target.triple }}/release/gateway gateway-${{ matrix.target.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: gateway-${{ matrix.target.name }}
          path: gateway-${{ matrix.target.name }}

  # ═══════════════════════════════════════════════════════════════════════
  # macOS: x86_64 + aarch64 (Apple Silicon)
  # ═══════════════════════════════════════════════════════════════════════
  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - { triple: aarch64-apple-darwin,   name: macos-aarch64 }
          - { triple: x86_64-apple-darwin,    name: macos-x86_64 }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target.triple }}

      - name: Rename binary
        run: cp target/${{ matrix.target.triple }}/release/gateway gateway-${{ matrix.target.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: gateway-${{ matrix.target.name }}
          path: gateway-${{ matrix.target.name }}

  # ═══════════════════════════════════════════════════════════════════════
  # Windows: x86_64
  # ═══════════════════════════════════════════════════════════════════════
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Rename binary
        run: copy target\release\gateway.exe gateway-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: gateway-windows-x86_64
          path: gateway-windows-x86_64.exe

  # ═══════════════════════════════════════════════════════════════════════
  # Release: collect all binaries, create tarball, publish to GitHub Release
  # ═══════════════════════════════════════════════════════════════════════
  release:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.create_release
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "${{ steps.ver.outputs.version }}" -m "Release ${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gateway-*
          path: dist/
          merge-multiple: true

      - name: Show dist
        run: ls -lh dist/

      - name: Pack SDK
        run: |
          cp doc/gateway-protocol/protocol.md dist/
          cp -r client_sdk dist/
          echo "gateway ${{ steps.ver.outputs.version }}" > dist/VERSION.txt
          echo "build date: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> dist/VERSION.txt

      - name: Create tarball
        run: tar czf gateway-release.tar.gz -C dist .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: |
            dist/gateway-linux-x86_64
            dist/gateway-linux-aarch64
            dist/gateway-windows-x86_64.exe
            dist/gateway-macos-x86_64
            dist/gateway-macos-aarch64
            gateway-release.tar.gz
          body: |
            ## Rust Smart Gateway — automated build

            ### Binaries

            | Platform | Arch | File |
            |---|---|---|
            | Linux | x86_64 | `gateway-linux-x86_64` |
            | Linux | ARM64 | `gateway-linux-aarch64` |
            | macOS | Intel | `gateway-macos-x86_64` |
            | macOS | Apple Silicon (M1/M2/M3) | `gateway-macos-aarch64` |
            | Windows | x86_64 | `gateway-windows-x86_64.exe` |

            ### SDK & Docs

            `gateway-release.tar.gz` includes all binaries + client_sdk (Python/JS) + protocol.md.

            ### Build from source

            ```bash
            git clone https://github.com/ouut/ws_gateway.git
            cd ws_gateway
            cargo build --release
            ```
          draft: false
          prerelease: false
          generate_release_notes: true
